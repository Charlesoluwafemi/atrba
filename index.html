/* ── HERO BASE FIX ───────────────────────── */
.hero {

<script>
/* ── EDGE TAB SWITCH FIX ── */
function switchEdge(index) {
  const contents = document.querySelectorAll('.edge-content');
  const navItems = document.querySelectorAll('.edge-nav-item');
  const tabs = document.querySelectorAll('.edge-tab-btn');

  contents.forEach(c => c.classList.remove('active'));
  navItems.forEach(n => n.classList.remove('active'));
  tabs.forEach(t => t.classList.remove('active'));

  const active = document.getElementById('edge-' + index);
  if (active) active.classList.add('active');

  if (navItems[index]) navItems[index].classList.add('active');
  if (tabs[index]) tabs[index].classList.add('active');
}

/* ── FIX NAVBAR DUPLICATION ISSUE ── */
document.addEventListener("DOMContentLoaded", () => {
  const nav = document.querySelector("nav");

  if (nav) {
    const seen = new Set();
    nav.querySelectorAll("*").forEach(el => {
      const text = el.textContent?.trim();
      if (seen.has(text)) {
        el.remove(); // removes duplicate buttons like "Book a Call"
      } else {
        seen.add(text);
      }
    });
  }
});
</script>
