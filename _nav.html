  ═══════════════════════════════════════════════════════════

  every page, replacing the old <nav>...</nav>.

-->

<!-- ── DESKTOP + MOBILE NAV ──────────────────────────────── -->

    <!-- Logo -->

      <!--
        OPTION A — image logo (recommended once you have the file):
        <img src="/assets/atrba-logo.svg" alt="ATRBA" class="nav-logo-img">
      -->
      <!-- OPTION B — text logo (current default) -->
      <div>
        <div class="nav-logo-main">Above The Rest</div>
        <div class="nav-logo-sub">Business Advisors &nbsp;·&nbsp; ATRBA</div>
      </div>
    </a>

    <!-- Desktop links (hidden on mobile via .hide-mobile) -->
    <div class="nav-links">
      <a href="/services"     class="hide-mobile">Services</a>
      <a href="/atr-ai"       class="hide-mobile">ATR AI</a>
      <a href="/solutions"    class="hide-mobile">Industries</a>
      <a href="/case-studies" class="hide-mobile">Case Studies</a>
      <a href="/resources"    class="hide-mobile">Resources</a>
      <a href="/about"        class="hide-mobile">About</a>
      <a href="/contact"      class="nav-cta">Book a Call</a>
      <a href="/blog"         class="nav-cta" style="margin-left:.35rem">Blog</a>

    <!-- Hamburger (visible on mobile only) -->
    <button
      class="nav-hamburger"
      id="nav-hamburger"

      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>

</div>


<!--
  ═══════════════════════════════════════════════════════════
  NAV JAVASCRIPT — place before </body> on every page,
  or include once in a shared JS file.
  ═══════════════════════════════════════════════════════════
-->
<script>
(function() {
  const hamburger = document.getElementById('nav-hamburger');
  const drawer    = document.getElementById('nav-mobile-drawer');
  const nav       = document.getElementById('main-nav');
  if (!hamburger || !drawer) return;

  /* ── Toggle drawer open/close ─────────────────────────── */
  function toggleMenu(force) {
    const isOpen = typeof force === 'boolean' ? force : !hamburger.classList.contains('open');

    hamburger.classList.toggle('open', isOpen);
    drawer.classList.toggle('open', isOpen);
    hamburger.setAttribute('aria-expanded', isOpen);
    drawer.setAttribute('aria-hidden', !isOpen);

    // Prevent body scroll when drawer is open
    document.body.style.overflow = isOpen ? 'hidden' : '';
  }

  hamburger.addEventListener('click', function() { toggleMenu(); });

  /* ── Close on link click ──────────────────────────────── */
  drawer.querySelectorAll('a').forEach(function(link) {
    link.addEventListener('click', function() { toggleMenu(false); });
  });

  /* ── Close on Escape key ──────────────────────────────── */
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && hamburger.classList.contains('open')) {
      toggleMenu(false);
      hamburger.focus();
    }
  });

  /* ── Scroll: add .scrolled class for elevated shadow ──── */
  function onScroll() {
    nav.classList.toggle('scrolled', window.scrollY > 20);
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll(); // run once on load

  /* ── Mark active link by current path ────────────────────
     Works for both desktop .nav-links and mobile .nav-mobile-links */
  var path = window.location.pathname;
  document.querySelectorAll('.nav-links a, .nav-mobile-links a').forEach(function(a) {
    var href = a.getAttribute('href');
    if (href && href !== '/' && path.startsWith(href)) {
      a.classList.add('active');
    }
  });

})();
</script>
