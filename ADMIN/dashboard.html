<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — ATRBA Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

<div id="sidebar-slot"></div>

<div class="main-wrap">
  <header class="main-header">
    <h1 class="header-title">Dashboard</h1>
    <div class="header-actions">
      <a href="editor.html" class="btn btn-primary">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Post
      </a>
    </div>
  </header>

  <div class="main-content">
    <!-- Stats -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-icon" style="background:#dbeafe;color:#1e40af;">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
        <div class="stat-label">Total Posts</div>
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-sub">All blog entries</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#d1fae5;color:#065f46;">
          <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <div class="stat-label">Published</div>
        <div class="stat-value" id="stat-published">—</div>
        <div class="stat-sub">Live on the blog</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#fef3c7;color:#92400e;">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
        <div class="stat-label">Drafts</div>
        <div class="stat-value" id="stat-drafts">—</div>
        <div class="stat-sub">Unpublished posts</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#f0ded3;color:#c8622a;">
          <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
        <div class="stat-label">Featured</div>
        <div class="stat-value" id="stat-featured">—</div>
        <div class="stat-sub">Pinned to homepage</div>
      </div>
    </div>

    <!-- Recent posts -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Recent Posts</h2>
        <a href="blogs.html" class="btn btn-secondary btn-sm">View all</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Category</th>
              <th>Status</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="recent-table-body">
            <tr><td colspan="5" class="empty-table"><div class="spinner spinner-dark" style="margin:0 auto;"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="admin.js"></script>
<script>
  if (!requireAuth()) throw new Error('Not authenticated');
  renderSidebar('dashboard');

  async function loadDashboard() {
    try {
      const res = await authFetch('/admin/blogs');
      if (!res.ok) {
  showToast('Failed to load dashboard data', 'error');
  return;
}
      const blogs = await res.json();

      const total = blogs.length;
      const published = blogs.filter(b => b.published).length;
      const drafts = blogs.filter(b => !b.published).length;
      const featured = blogs.filter(b => b.featured).length;

      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-published').textContent = published;
      document.getElementById('stat-drafts').textContent = drafts;
      document.getElementById('stat-featured').textContent = featured;

      const recent = blogs.slice(0, 8);
      const tbody = document.getElementById('recent-table-body');

      if (!recent.length) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty-table"><div class="empty-table-icon">📝</div><p>No posts yet. <a href="editor.html" style="color:var(--accent)">Create your first post →</a></p></div></td></tr>`;
        return;
      }

      tbody.innerHTML = recent.map(b => `
        <tr>
          <td><a href="editor.html?id=${b.id}" style="font-weight:500;color:var(--ink);text-decoration:none;hover:color:var(--accent);">${b.title}</a></td>
          <td>${categoryBadge(b.category)}</td>
          <td>${b.published
            ? '<span class="badge badge-green">Published</span>'
            : '<span class="badge badge-gray">Draft</span>'}
            ${b.featured ? '<span class="badge badge-amber" style="margin-left:4px;">★ Featured</span>' : ''}</td>
          <td style="color:var(--ink-muted);">${formatDate(b.created_at)}</td>
          <td>
            <div style="display:flex;gap:8px;">
              <a href="editor.html?id=${b.id}" class="btn btn-ghost btn-sm">Edit</a>
              <a href="./public/post.html?slug=${b.slug}" target="_blank" class="btn btn-ghost btn-sm">View</a>
            </div>
          </td>
        </tr>`).join('');

    } catch (e) {
      showToast('Failed to load dashboard data', 'error');
    }
  }

  loadDashboard();
</script>
</body>
</html>
