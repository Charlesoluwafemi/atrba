<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — ATRBA CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:      #0f0e0d; --ink-muted: #6b6560; --ink-faint: #b5b0aa;
      --paper:    #faf9f7; --paper-warm:#f3f0eb;
      --accent:   #c8622a; --accent-lt: #f0ded3; --accent-dk: #9e4a1a;
      --rule:     #e8e3dc;
      --serif:    'Playfair Display', Georgia, serif;
      --sans:     'DM Sans', system-ui, sans-serif;
      --radius:   10px;
    }
    body { font-family: var(--sans); background: var(--paper-warm); color: var(--ink); min-height: 100vh; display: flex; -webkit-font-smoothing: antialiased; }

    .left-panel {
      width: 420px; flex-shrink: 0; background: var(--ink); padding: 56px 48px;
      display: flex; flex-direction: column; justify-content: space-between;
      position: relative; overflow: hidden;
    }
    .left-panel::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(200,98,42,.25) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 80%, rgba(200,98,42,.12) 0%, transparent 50%);
    }
    .panel-logo { position: relative; }
    .panel-logo-mark { width: 40px; height: 40px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
    .panel-logo-mark svg { width: 20px; height: 20px; fill: none; stroke: var(--ink); stroke-width: 2; }
    .panel-brand { font-family: var(--serif); font-size: 1.5rem; font-weight: 700; color: #fff; }
    .panel-tagline { font-size: .875rem; color: rgba(255,255,255,.45); margin-top: 6px; font-weight: 300; }

    .panel-quote { position: relative; }
    .quote-text { font-family: var(--serif); font-size: 1.25rem; font-weight: 400; font-style: italic; line-height: 1.6; color: rgba(255,255,255,.75); }
    .quote-author { font-size: .8125rem; color: rgba(255,255,255,.35); margin-top: 16px; }

    .panel-footer { position: relative; font-size: .75rem; color: rgba(255,255,255,.25); }

    .right-panel { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
    .login-card { width: 100%; max-width: 420px; }

    .login-welcome { font-family: var(--serif); font-size: 2rem; font-weight: 700; letter-spacing: -.02em; color: var(--ink); margin-bottom: 8px; }
    .login-sub { font-size: .9375rem; color: var(--ink-muted); font-weight: 300; margin-bottom: 40px; }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: .8125rem; font-weight: 500; color: var(--ink); margin-bottom: 8px; }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--ink-faint); fill: none; stroke-width: 2; pointer-events: none; }
    input[type=text], input[type=password] {
      width: 100%; padding: 12px 14px 12px 42px;
      font-family: var(--sans); font-size: .9375rem; color: var(--ink);
      background: #fff; border: 1.5px solid var(--rule); border-radius: var(--radius);
      transition: border-color .2s, box-shadow .2s; outline: none;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-lt); }
    input.error { border-color: #dc2626; }

    .btn-login {
      width: 100%; padding: 13px; font-family: var(--sans); font-size: .9375rem;
      font-weight: 500; color: #fff; background: var(--accent); border: none;
      border-radius: var(--radius); cursor: pointer; transition: background .2s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-top: 8px;
    }
    .btn-login:hover { background: var(--accent-dk); }
    .btn-login:active { transform: scale(.99); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .error-msg { display: none; background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; font-size: .85rem; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; }
    .error-msg.show { display: block; }

    .spinner-sm { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hint { margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--rule); }
    .hint p { font-size: .8125rem; color: var(--ink-faint); line-height: 1.6; }
    .hint code { font-size: .8rem; background: var(--paper-warm); padding: 2px 6px; border-radius: 4px; color: var(--ink-muted); }

    @media (max-width: 768px) { .left-panel { display: none; } .right-panel { padding: 32px 24px; } }
  </style>
</head>
<body>

<div class="left-panel">
  <div class="panel-logo">
    <div class="panel-logo-mark"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h10M4 18h12"/></svg></div>
    <p class="panel-brand">ATRBA CMS</p>
    <p class="panel-tagline">Content Management System</p>
  </div>
  <div class="panel-quote">
    <p class="quote-text">"The best writing is rewriting. The best publishing is a great CMS."</p>
    <p class="quote-author">— The ATRBA Team</p>
  </div>
  <div class="panel-footer">© 2025 ATRBA. All rights reserved.</div>
</div>

<div class="right-panel">
  <div class="login-card">
    <h1 class="login-welcome">Welcome back</h1>
    <p class="login-sub">Sign in to your admin panel.</p>

    <div class="error-msg" id="error-msg">Invalid credentials. Please try again.</div>

    <div class="form-group">
      <label for="username">Username</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="text" id="username" placeholder="admin" autocomplete="username" />
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
    </div>

    <button class="btn-login" id="login-btn" onclick="handleLogin()">
      Sign in
    </button>
  </div>
</div>

<script src="admin.js"></script>
<script>
  // Redirect if session is still valid (not just token present — check expiry too)
  if (isSessionValid()) {
    location.replace('dashboard.html');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  async function handleLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('login-btn');
    const errEl    = document.getElementById('error-msg');

    if (!username || !password) {
      errEl.textContent = 'Please enter your username and password.';
      errEl.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner-sm"></div> Signing in…';
    errEl.classList.remove('show');

    try {
      // loginRequest() from admin.js stores token + expiry + user together
      await loginRequest(username, password);
      location.replace('dashboard.html');
    } catch (e) {
      errEl.textContent = e.message === 'Invalid credentials'
        ? 'Incorrect username or password.'
        : 'Connection error. Check your API server.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = 'Sign in';
    }
  }
</script>
</body>
</html>
